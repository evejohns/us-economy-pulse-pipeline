version: 2

models:
  - name: stg_gdp
    description: |
      Cleaned and standardized Real GDP data from FRED.
      Quarterly frequency, representing the inflation-adjusted total economic output.
    columns:
      - name: period_date
        description: The date of the observation
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: date

      - name: period_date_key
        description: Period date cast to date type for joins
        data_tests:
          - not_null

      - name: series_code
        description: FRED series identifier
        data_tests:
          - not_null
          - accepted_values:
              values: ['GDPC1']

      - name: gdp_billions_usd
        description: GDP value in billions of chained 2012 US dollars
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_type_list:
              column_type_list: ['numeric']
          - test_valid_economic_range:
              min_value: 0
              max_value: 30000

      - name: data_source
        description: Source of the data (FRED)
        data_tests:
          - not_null
          - accepted_values:
              values: ['FRED']

      - name: indicator_type
        description: Type/category of economic indicator
        data_tests:
          - not_null
          - accepted_values:
              values: ['Economic Output']

      - name: indicator_name
        description: Standardized indicator name
        data_tests:
          - not_null

      - name: loaded_at
        description: When data was ingested from source
        data_tests:
          - not_null

      - name: is_latest
        description: Flag indicating if this is the most recent record
        data_tests:
          - not_null

      - name: dbt_loaded_at
        description: When dbt processed this record
        data_tests:
          - not_null

