name: Generate and Deploy dbt Docs

on:
  # Deploy on every push to main branch
  push:
    branches:
      - main
  # Allow manual triggering
  workflow_dispatch:

# Prevent concurrent deployment attempts
concurrency:
  group: dbt-docs-deploy
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Permissions needed to deploy to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      # Set dbt profiles directory for dbt commands
      DBT_PROFILES_DIR: ./dbt_project
      # Secrets referenced at job level for clarity
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      # 1. Checkout repository code
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@0a5c61591373683ada265d370569acf60f21e5d4 # v5.0.0
        with:
          python-version: '3.11'

      # 3. Cache pip dependencies to speed up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt
        continue-on-error: false

      # 5. Install dbt dependencies
      - name: Install dbt dependencies
        run: cd dbt_project && dbt deps
        continue-on-error: false

      # 6. Generate dbt documentation
      # Creates manifest.json and index.html with model lineage and descriptions
      - name: Generate dbt documentation
        run: cd dbt_project && dbt docs generate
        continue-on-error: false

      # 7. Upload dbt docs artifact
      # Stores generated docs for GitHub Pages deployment
      - name: Upload dbt docs artifact
        uses: actions/upload-artifact@v4.3.1 # v4.3.1
        with:
          name: dbt-docs
          path: dbt_project/target/
          retention-days: 90

      # 8. Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@3c0b9dc8c00db2f464af065905a7dadc37aab18a # v4.0.0

      # 9. Upload pages artifact for deployment
      # GitHub Pages-compatible artifact format
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dbt_project/target/

      # 10. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164658585dc3b763a27e327f2d67285eac # v4.0.5

      # Add summary of docs generation and deployment
      - name: Add job summary
        if: always()
        run: |
          echo "## dbt Documentation Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** dbt docs with model lineage and descriptions" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to:** GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "**Page URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the documentation at: **${{ steps.deployment.outputs.page_url }}**" >> $GITHUB_STEP_SUMMARY
