name: PR Quality Checks

on:
  # Trigger on pull requests to main branch
  pull_request:
    branches:
      - main

# Prevent concurrent PR checks
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Minimal permissions - only read access to repo contents
    permissions:
      contents: read
      pull-requests: write

    env:
      # Set dbt profiles directory for dbt commands
      DBT_PROFILES_DIR: ./dbt_project
      # Secrets referenced at job level for clarity
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      # 1. Checkout PR code
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@0a5c61591373683ada265d370569acf60f21e5d4 # v5.0.0
        with:
          python-version: '3.11'

      # 3. Cache pip dependencies to speed up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt
        continue-on-error: false

      # 5. Python linting with flake8
      # Validates code style and catches common errors before review
      - name: Run Python linting (flake8)
        id: lint
        run: |
          pip install flake8
          flake8 src/ --max-line-length=120 --ignore=E501 --format=json > lint-results.json || true
          cat lint-results.json
        continue-on-error: true

      # 6. Install dbt dependencies
      - name: Install dbt dependencies
        run: cd dbt_project && dbt deps
        continue-on-error: false

      # 7. dbt parse - validates model SQL without executing queries
      # Fast syntax validation of all dbt models and tests
      - name: Parse dbt models (syntax validation)
        id: dbt-parse
        run: cd dbt_project && dbt parse
        continue-on-error: false

      # 8. Security scan for hardcoded secrets
      # Prevents accidental credential exposure in repository
      - name: Run security audit for secrets
        id: security
        run: |
          python src/security/audit_secrets.py --path . --fail-on-found || {
            echo "⚠️ Security audit detected potential secrets" >> $GITHUB_STEP_SUMMARY
            exit 1
          }
        continue-on-error: false

      # 9. Dependency vulnerability scan
      # Identifies known security issues in dependencies
      - name: Run dependency vulnerability scan
        id: audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || {
            echo "⚠️ Vulnerability scan found issues" >> $GITHUB_STEP_SUMMARY
            exit 1
          }
        continue-on-error: false

      # 10. Post PR comment with check results
      # Provides developer feedback directly in PR
      - name: Post PR comment with results
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const checks = {
              lint: '${{ steps.lint.outcome }}',
              dbt_parse: '${{ steps.dbt-parse.outcome }}',
              security: '${{ steps.security.outcome }}',
              audit: '${{ steps.audit.outcome }}'
            };

            const checkResults = Object.entries(checks)
              .map(([name, outcome]) => '- ' + name + ': ' + (outcome === 'success' ? '✅' : '❌'))
              .join('\n');

            const comment = '## PR Quality Checks Summary\n\n' + checkResults + '\n\n**Details:**\n- **Python Linting:** Code style validation with flake8\n- **dbt Parse:** SQL syntax validation\n- **Security Audit:** Hardcoded secrets detection\n- **Dependency Audit:** Vulnerability scanning\n\nAll checks must pass before merging. Review the logs for details.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      # Add summary of PR checks to GitHub Actions summary
      - name: Add job summary
        if: always()
        run: |
          echo "## PR Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Lint Status:** ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**dbt Parse Status:** ${{ steps.dbt-parse.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Security Audit Status:** ${{ steps.security.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dependency Audit Status:** ${{ steps.audit.outcome }}" >> $GITHUB_STEP_SUMMARY
