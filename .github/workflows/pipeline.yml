name: US Economy Pulse Pipeline

on:
  schedule:
    # Runs every Monday at 8am UTC (FRED updates most series weekly)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests python-dotenv

      - name: Run FRED backfill (ingest latest data)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python run_backfill.py

      - name: Install dbt dependencies
        run: |
          pip install dbt-postgres

      - name: Create dbt profiles.yml
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_PORT: ${{ secrets.DBT_PORT }}
          DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
          DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}
        run: |
          python3 -c "
          import os, pathlib
          content = '''us_economy_pulse:
            target: prod
            outputs:
              prod:
                type: postgres
                host: \"{}\"
                user: \"{}\"
                password: \"{}\"
                port: {}
                dbname: \"{}\"
                schema: \"{}\"
                connect_timeout: 30
                sslmode: require
          '''.format(
              os.environ['DBT_HOST'],
              os.environ['DBT_USER'],
              os.environ['DBT_PASSWORD'],
              os.environ['DBT_PORT'],
              os.environ['DBT_DATABASE'],
              os.environ['DBT_SCHEMA']
          )
          p = pathlib.Path.home() / '.dbt'
          p.mkdir(exist_ok=True)
          (p / 'profiles.yml').write_text(content)
          "

      - name: Debug connection info
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PORT: ${{ secrets.DBT_PORT }}
        run: |
          echo "Host length: ${#DBT_HOST}"
          echo "User length: ${#DBT_USER}"
          echo "Port: ${DBT_PORT}"
          echo "User starts with: ${DBT_USER:0:12}..."
          echo "Host starts with: ${DBT_HOST:0:12}..."
          cat ~/.dbt/profiles.yml | sed 's/password:.*/password: "***"/'

      - name: Run dbt transformations
        run: |
          cd dbt_project
          dbt deps
          dbt run
          dbt test --store-failures

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed at $(date). Check the Actions tab for details."
