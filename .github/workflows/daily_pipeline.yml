name: Daily Pipeline

on:
  # Run at 9 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * *'
  # Allow manual triggering
  workflow_dispatch:

# Prevent concurrent runs of this workflow
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Minimal permissions - only read access to repo contents
    permissions:
      contents: read

    env:
      # Set dbt profiles directory for dbt commands
      DBT_PROFILES_DIR: ./dbt_project
      # Secrets referenced at job level for clarity
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      # 1. Checkout repository code
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@0a5c61591373683ada265d370569acf60f21e5d4 # v5.0.0
        with:
          python-version: '3.11'

      # 3. Cache pip dependencies to speed up subsequent runs
      - name: Cache pip dependencies
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 3. Install Python dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run pre-ingestion quality checks
      # Validates data sources and dependencies before ingestion begins
      - name: Run pre-ingestion quality checks
        run: python src/quality/run_quality_checks.py --stage pre
        continue-on-error: false

      # 5. Run FRED API ingestion in incremental mode
      # Fetches only new/updated data since last run
      - name: Run FRED incremental ingestion
        run: python src/ingestion/run_ingestion.py --mode incremental
        continue-on-error: false

      # 6. Install dbt dependencies
      - name: Install dbt dependencies
        run: cd dbt_project && dbt deps
        continue-on-error: false

      # 7. Check dbt source freshness
      # Verifies that data source metadata is current
      - name: Check dbt source freshness
        run: cd dbt_project && dbt source freshness
        continue-on-error: false

      # 8. Run dbt models to transform raw data into analytics tables
      - name: Run dbt models
        run: cd dbt_project && dbt run
        continue-on-error: false

      # 9. Run dbt tests to validate data quality and integrity
      - name: Run dbt tests
        run: cd dbt_project && dbt test
        continue-on-error: false

      # 10. Run post-transform quality checks
      # Validates results after dbt transformations
      - name: Run post-transform quality checks
        run: python src/quality/run_quality_checks.py --stage post
        continue-on-error: false

      # 11. Send Slack notification (runs regardless of previous step failures)
      # Notifies team of pipeline status for monitoring
      - name: Send Slack notification
        if: always()
        run: |
          python -c "
          import requests
          import json
          from datetime import datetime

          status = 'passed' if '${{ job.status }}' == 'success' else 'failed'
          color = '36a64f' if status == 'passed' else 'ff0000'

          message = {
              'attachments': [{
                  'color': color,
                  'title': f'Daily Pipeline {status.upper()}',
                  'text': f'Run: ${{ github.run_id }}\nBranch: ${{ github.ref_name }}\nTime: {datetime.now().isoformat()}',
                  'actions': [{
                      'type': 'button',
                      'text': 'View Run',
                      'url': '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
                  }]
              }]
          }

          requests.post('${{ env.SLACK_WEBHOOK_URL }}', json=message)
          "

      # Add summary of pipeline execution to GitHub Actions summary
      - name: Add job summary
        if: always()
        run: |
          echo "## Daily Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
