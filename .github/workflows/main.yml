name: US Economy Pulse Pipeline

on:
  schedule:
    # Runs every Monday at 8am UTC (FRED updates most series weekly)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests python-dotenv

      - name: Run FRED backfill (ingest latest data)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python run_backfill.py

      - name: Install dbt dependencies
        run: |
          pip install dbt-postgres

      - name: Run dbt transformations
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_USER: ${{ secrets.DBT_USER }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
          DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}
          DBT_PORT: ${{ secrets.DBT_PORT }}
        run: |
          cd dbt_project
          dbt deps
          dbt run --profiles-dir .
          dbt test --profiles-dir . --store-failures

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed at $(date). Check the Actions tab for details."
